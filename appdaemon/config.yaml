---
name: AppDaemonMidnight
version: dev
slug: appdaemon
description: Python Apps and Dashboard using AppDaemon 4.x for Home Assistant
url: https://github.com/midnight-security/app-appdaemon
webui: http://[HOST]:[PORT:5056]
arch:
  - aarch64
  - amd64
init: false
homeassistant_api: true
host_network: true
uart: true

ports:
  5050/tcp: 5060        # container 5050 → host 5060 (HADashboard / admin)
  8080/tcp: 8080        # example: alarm web UI
  1883/tcp: 1883        # example: alarm MQTT broker
  9000/tcp: 9000        # example: alarm sensor receiver
  5051/tcp: 5051        # Radar port
ports_description:
  5050/tcp: AppDaemon admin & HADashboard
  8080/tcp: Alarm system web UI
  1883/tcp: Alarm MQTT
  9000/tcp: Alarm sensor receiver
  5051/tcp: Radar port
map:
  - addon_config:rw
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl
options:
  system_packages: []
  python_packages: []
  init_commands: []
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  system_packages:
    - str
  python_packages:
    - str
  init_commands:
    - str
