---
name: AppDaemonMidnight
version: dev                              # OK for dev; remember to "Rebuild" each iteration
slug: appdaemon
description: Python Apps and Dashboard using AppDaemon 4.x for Home Assistant
url: https://github.com/midnight-security/app-appdaemon
webui: http://[HOST]:[PORT:5050]          # FIX: was [PORT:5056]
arch:
  - aarch64
  - amd64
init: false
homeassistant_api: true
hassio_api: true                          # ADD: needed for auto ha_url/token injection
auth_api: true                            # ADD: same
# host_network: true                      # DECIDE: remove this OR remove ports: below
uart: true
ports:                                    # only meaningful if host_network is removed
  5050/tcp: 5060
  8080/tcp: 8080
  1883/tcp: 1883
  9000/tcp: 9000
  5051/tcp: 5051
ports_description:
  5050/tcp: AppDaemon admin & HADashboard
  8080/tcp: Alarm system web UI
  1883/tcp: Alarm MQTT
  9000/tcp: Alarm sensor receiver
  5051/tcp: Radar port
map:
  - addon_config:rw
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl
options:
  log_level: info                         # ADD: default for the schema entry
  system_packages:
    - py3-scikit-learn
    - py3-numpy
    - py3-scipy
    - py3-joblib
    - py3-threadpoolctl
  python_packages:
    - paho-mqtt
  init_commands: []
 
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  system_packages:
    - str
  python_packages:
    - str
  init_commands:
    - str
